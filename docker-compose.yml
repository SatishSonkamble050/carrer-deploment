version: "3.9"

services:

  frontend:
    build:
      context: D:/Projects/AI Project/Student carrer/ai-student-fortend/ai-student-fortend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-network

  backend:
    build:
      context: D:/Projects/AI Project/Student carrer/career_guidance_app/career_guidance_app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - app-network

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network: